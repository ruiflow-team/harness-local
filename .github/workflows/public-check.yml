name: Public package check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  public-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify bundled package checksum
        run: |
          cd releases/v0.26.2
          sha256sum -c SHA256SUMS
      - name: Verify public docs have expected files
        run: |
          test -f index.html
          test -f README.md
          test -f docs/INSTALL.md
          test -f docs/CONFIGURATION.md
          test -f docs/QUICK-CHECKUP.md
          test -f docs/PROJECT-CHECKUP-SCHEMA.md
          test -f docs/PROJECT-CHECKUP-FEEDBACK.md
          test -f docs/PROJECT-CHECKUP-SAMPLE.md
          test -f docs/PROJECT-CHECKUP-SAMPLE.html
          test -f .github/ISSUE_TEMPLATE/project-checkup-feedback.yml
          test -f install.sh
      - name: Guard public Chinese wording and version regressions
        run: |
          set -euo pipefail
          forbidden='招 10|种子用户|seed-user|SEED-USER|Seed user|第一批真实用户|限量|私信|评论区领取|名额|v0\.24\.[0-9]+\.[0-9]+|TRIAL-BUNDLE|harness-local-v0\.24\.6+'
          if grep -RInE "$forbidden" \
            --exclude-dir=.git \
            --exclude-dir=releases \
            --exclude='public-check.yml' \
            --exclude='*.png' \
            --exclude='*.jpg' \
            --exclude='*.jpeg' \
            --exclude='*.webp' \
            .; then
            echo "Forbidden public wording or version regression found." >&2
            exit 1
          fi
          grep -q '试用反馈 / 安装问题' .github/ISSUE_TEMPLATE/trial-feedback.yml
          grep -q '欢迎提交安装、启动、自检或使用问题' README.md
      - name: Extract and smoke test package
        run: |
          tmp="$(mktemp -d)"
          unzip -q releases/v0.26.2/harness-local-v0.26.2-beta.zip -d "$tmp"
          cd "$tmp/harness-local-v0.26.2-beta"
          HARNESS_DATA_DIR="$tmp/data" ./harness smoke-empty
          HARNESS_DATA_DIR="$tmp/data" ./harness doctor > doctor.json
          python3 -c "import json; j=json.load(open('doctor.json')); assert j['version']=='0.26.2'; assert j['diagnosis']['version']=='doctor-diagnosis-v0.26.2'; assert j['share_contract']['version']=='share-contract-v0.26.2'; assert j['share_contract']['not_proof_of_external_validation'] is True"
          HARNESS_DATA_DIR="$tmp/data" ./harness doctor-report | grep -q "Harness Local Doctor"
          HARNESS_DATA_DIR="$tmp/data" ./harness checkup-sample > checkup-sample-summary.json
          python3 -c "import json; j=json.load(open('dist/evidence/CHECKUP-SAMPLE/checkup-sample.json')); assert j['schema_version']=='harness-checkup-sample-v0.26.2'; assert j['share_contract']['version']=='share-contract-v0.26.2'; assert j['readiness']=='red'"
          HARNESS_DATA_DIR="$tmp/data" ./harness project-checkup > project-checkup-summary.json
          python3 -c "import json; j=json.load(open('dist/evidence/PROJECT-CHECKUP/project-checkup.json')); assert j['schema_version']=='project-checkup-v0.26.2'; assert j['share_contract']['version']=='share-contract-v0.26.2'; assert j['local_only'] is True; assert j['commercial_boundary']['lead_capture_online'] is False"
          HARNESS_DATA_DIR="$tmp/data" ./harness project-checkup-feedback > project-checkup-feedback-summary.json
          python3 -c "import json; j=json.load(open('dist/evidence/PROJECT-CHECKUP-FEEDBACK/project-checkup-feedback-template.json')); assert j['schema_version']=='project-checkup-feedback-v0.26.2'; assert j['network_submitter'] is False"
          HARNESS_DATA_DIR="$tmp/data" ./harness project-checkup-sample-report > project-checkup-sample-report-summary.json
          test -f dist/evidence/PROJECT-CHECKUP-SAMPLE/PROJECT-CHECKUP-SAMPLE.html
          python3 -c "import json; j=json.load(open('dist/evidence/PROJECT-CHECKUP-SAMPLE/project-checkup-sample-report.json')); assert j['schema_version']=='project-checkup-sample-report-v0.26.2'; assert j['not_customer_case'] is True; assert j['not_external_validation'] is True"
          HARNESS_DATA_DIR="$tmp/data" ./harness feedback-bundle
          test -f dist/evidence/FEEDBACK-BUNDLE/DOCTOR-REPORT.md
          python3 -c "import json; j=json.load(open('dist/evidence/FEEDBACK-BUNDLE/doctor.json')); assert j['share_contract']['version']=='share-contract-v0.26.2'"
