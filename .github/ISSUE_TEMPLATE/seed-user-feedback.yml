name: Seed user feedback
about: Share Harness Local beta install/test feedback
labels: [feedback, seed-user]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Harness Local beta. Please do not paste secrets, API keys, private source code, or customer data.
  - type: input
    id: role
    attributes:
      label: Your role
      placeholder: Developer / founder / PM / designer / student ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: python3 --version
  - type: dropdown
    id: install_status
    attributes:
      label: Did installation/startup work?
      options:
        - Yes, first try
        - Yes, after fixing something
        - No
    validations:
      required: true
  - type: textarea
    id: install_notes
    attributes:
      label: Install/startup notes
      description: What command did you run? Where did it fail or succeed?
      placeholder: curl -L ... | sh / ./harness serve / browser opened ...
  - type: dropdown
    id: value
    attributes:
      label: How useful is the current beta?
      options:
        - 5 - very useful, I want to keep using it
        - 4 - useful after small fixes
        - 3 - interesting but unclear
        - 2 - not useful yet
        - 1 - I do not understand it
    validations:
      required: true
  - type: textarea
    id: desired_next
    attributes:
      label: What should v0.25 improve first?
      placeholder: Better onboarding / project report / AI task planning / safer checks / UI / docs / other...
  - type: dropdown
    id: willingness
    attributes:
      label: Would you try a paid/private beta later?
      options:
        - Yes
        - Maybe
        - No
        - Need more information
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Do not include secrets or private code.
